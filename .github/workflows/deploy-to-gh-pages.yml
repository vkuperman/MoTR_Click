name: Build and Deploy Demo to GitHub Pages
on:
  push:
    branches: [ main ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build Demo
        run: |
          cd run_motr_in_magpie/demo
          npm install
          npm run build

      - name: Add .nojekyll for GitHub Pages
        run: touch run_motr_in_magpie/demo/dist/.nojekyll

      - name: Deploy Demo to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: run_motr_in_magpie/demo/dist
          destination_dir: demo
